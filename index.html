<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Osama's Lexicon A-Z (Ultra Edition)</title>
    <style>
        :root { --p: #0f172a; --a: #3b82f6; --bg: #f1f5f9; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        header { background: var(--p); color: white; padding: 15px; text-align: center; border-bottom: 4px solid var(--a); }
        header h1 { margin: 0; font-size: 16px; text-transform: uppercase; letter-spacing: 2px; }
        .controls { background: white; border-bottom: 1px solid #e2e8f0; padding: 10px; z-index: 10; }
        #search { width: 94%; margin: 0 3% 10px 3%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 8px; font-size: 15px; outline: none; }
        #search:focus { border-color: var(--a); box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1); }
        .alpha-bar { display: flex; overflow-x: auto; gap: 6px; padding: 5px 10px; scrollbar-width: none; }
        .alpha-bar::-webkit-scrollbar { display: none; }
        .l-btn { min-width: 38px; height: 38px; display: flex; align-items: center; justify-content: center; background: #e2e8f0; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 13px; color: #475569; }
        .l-btn.active { background: var(--a); color: white; }
        #grid { flex: 1; overflow-y: auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 8px; padding: 15px; align-content: start; }
        .card { background: white; padding: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #e2e8f0; cursor: pointer; border-radius: 10px; transition: 0.15s; }
        .card:hover { border-color: var(--a); background: #f8fafc; }
        .en-box { display: flex; flex-direction: column; line-height: 1.3; max-width: 65%; }
        .en { font-weight: 700; font-size: 14px; color: #1e293b; }
        .tg { font-size: 10px; color: var(--a); font-weight: 600; text-transform: uppercase; }
        .ar { font-size: 15px; font-weight: bold; color: #334155; text-align: right; direction: rtl; }
        #stats { font-size: 10px; color: #94a3b8; text-align: center; padding-bottom: 5px; }
    </style>
</head>

const g = document.getElementById('grid'), n = document.getElementById('nav');
let cur = 'A';

function setup() {
    "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("").forEach(l => {
        const b = document.createElement('div');
        b.className = `l-btn ${l==='A'?'active':''}`; b.id = `L-${l}`; b.innerText = l;
        b.onclick = () => show(l); n.appendChild(b);
    });
    let total = 0; for(let k in db) total += db[k].split('|').length;
    document.getElementById('stats').innerText = `${total} Specialized Terms - Data Optimized`;
    show('A');
}

function show(l) {
    cur = l; document.querySelectorAll('.l-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(`L-${l}`).classList.add('active');
    draw((db[l] || "").split('|').filter(Boolean).map(s => s.split('~')));
}

function draw(data) {
    g.innerHTML = data.map(w => `<div class="card" onclick="spk('${w[0]}')"><div class="en-box"><span class="en">${w[0]}</span><span class="tg">${w[1]}</span></div><span class="ar">${w[2]}</span></div>`).join("");
}

function doSearch() {
    const q = document.getElementById('search').value.toLowerCase().trim();
    if(!q) { show(cur); return; }
    let m = []; for(let l in db) {
        m = m.concat(db[l].split('|').filter(Boolean).map(s => s.split('~')).filter(w => w[0].toLowerCase().includes(q) || w[2].toLowerCase().includes(q)));
    }
    draw(m);
}

function spk(t) {
    if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
        const s = new SpeechSynthesisUtterance(t); s.lang = 'en-US'; s.rate = 0.95;
        window.speechSynthesis.speak(s);
    }
}
setup();
</script>
